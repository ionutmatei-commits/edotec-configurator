  <text x="187" y="113" text-anchor="middle" font-family="Arial" font-size="9" font-weight="700" fill="#d63031">4 uși + haion</text>
  
  <!-- Titlu pachet -->
  <text x="200" y="193" text-anchor="middle" font-family="Arial" font-size="11" font-weight="800" fill="#1a1a2e">4 Uși + Portbagaj</text>
