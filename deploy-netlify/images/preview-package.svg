  <path d="M212 84 L212 62 L250 55 L268 62 L268 84 Z" fill="#90c4e8" opacity="0.7"/>
  <path d="M272 84 L285 65 L300 72 L295 84 Z" fill="#90c4e8" opacity="0.7"/>
  
  <!-- Roata fata -->
  <circle cx="110" cy="148" r="22" fill="#555" stroke="#333" stroke-width="2"/>
  <circle cx="110" cy="148" r="12" fill="#888"/>
  <circle cx="110" cy="148" r="5" fill="#aaa"/>
  
  <!-- Roata spate -->
  <circle cx="295" cy="148" r="22" fill="#555" stroke="#333" stroke-width="2"/>
  <circle cx="295" cy="148" r="12" fill="#888"/>
  <circle cx="295" cy="148" r="5" fill="#aaa"/>
  
  <!-- Bara fata -->
